<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="350" fill="#0a0a0f" rx="8"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#5c5c72" font-size="11" font-family="monospace" letter-spacing="2">PLATO ROOM ARCHITECTURE</text>

  <!-- Keeper (top center) -->
  <rect x="220" y="50" width="160" height="50" rx="8" fill="#12121a" stroke="#7b2fff" stroke-width="1.5"/>
  <text x="300" y="72" text-anchor="middle" fill="#7b2fff" font-size="11" font-weight="bold" font-family="monospace">KEEPER</text>
  <text x="300" y="88" text-anchor="middle" fill="#5c5c72" font-size="9" font-family="monospace">oracle1 · port 8900</text>

  <!-- Arrow down -->
  <line x1="300" y1="100" x2="300" y2="130" stroke="#2e2e44" stroke-width="1" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e2e44"/>
    </marker>
  </defs>

  <!-- Rooms row -->
  <rect x="40" y="135" width="120" height="60" rx="6" fill="#12121a" stroke="#00c8e0" stroke-width="1"/>
  <text x="100" y="158" text-anchor="middle" fill="#00c8e0" font-size="10" font-weight="bold" font-family="monospace">Room: forge</text>
  <text x="100" y="178" text-anchor="middle" fill="#5c5c72" font-size="8" font-family="monospace">tiles: 847 · φ: 12.3</text>

  <rect x="180" y="135" width="120" height="60" rx="6" fill="#12121a" stroke="#00c8e0" stroke-width="1"/>
  <text x="240" y="158" text-anchor="middle" fill="#00c8e0" font-size="10" font-weight="bold" font-family="monospace">Room: ops</text>
  <text x="240" y="178" text-anchor="middle" fill="#5c5c72" font-size="8" font-family="monospace">tiles: 1203 · φ: 18.1</text>

  <rect x="320" y="135" width="120" height="60" rx="6" fill="#12121a" stroke="#00c8e0" stroke-width="1"/>
  <text x="380" y="158" text-anchor="middle" fill="#00c8e0" font-size="10" font-weight="bold" font-family="monospace">Room: fleet</text>
  <text x="380" y="178" text-anchor="middle" fill="#5c5c72" font-size="8" font-family="monospace">tiles: 562 · φ: 9.7</text>

  <rect x="460" y="135" width="100" height="60" rx="6" fill="#12121a" stroke="#2e2e44" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="510" y="160" text-anchor="middle" fill="#5c5c72" font-size="10" font-family="monospace">...</text>
  <text x="510" y="178" text-anchor="middle" fill="#5c5c72" font-size="8" font-family="monospace">+N more</text>

  <!-- Arrows from rooms to tiles -->
  <line x1="100" y1="195" x2="100" y2="225" stroke="#2e2e44" stroke-width="1"/>
  <line x1="240" y1="195" x2="240" y2="225" stroke="#2e2e44" stroke-width="1"/>
  <line x1="380" y1="195" x2="380" y2="225" stroke="#2e2e44" stroke-width="1"/>

  <!-- Tiles (small blocks) -->
  <g>
    <!-- Room: forge tiles -->
    <rect x="60" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <rect x="95" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <rect x="130" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <text x="110" y="244" text-anchor="middle" fill="#5c5c72" font-size="7" font-family="monospace">constraint tiles</text>

    <!-- Room: ops tiles -->
    <rect x="200" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <rect x="235" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <rect x="270" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <text x="250" y="244" text-anchor="middle" fill="#5c5c72" font-size="7" font-family="monospace">decision tiles</text>

    <!-- Room: fleet tiles -->
    <rect x="340" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <rect x="375" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <rect x="410" y="230" width="30" height="20" rx="3" fill="#1a1a2e" stroke="#2e2e44" stroke-width="0.5"/>
    <text x="390" y="244" text-anchor="middle" fill="#5c5c72" font-size="7" font-family="monospace">insight tiles</text>
  </g>

  <!-- Agent connections (bottom) -->
  <line x1="100" y1="255" x2="100" y2="280" stroke="#2e2e44" stroke-width="1"/>
  <line x1="300" y1="255" x2="300" y2="280" stroke="#2e2e44" stroke-width="1"/>
  <line x1="500" y1="255" x2="500" y2="280" stroke="#2e2e44" stroke-width="1"/>

  <!-- Agent labels -->
  <circle cx="100" cy="295" r="8" fill="#e8a820" filter="url(#glow)"/>
  <text x="100" y="318" text-anchor="middle" fill="#9494a8" font-size="9" font-family="monospace">⚒️ Forgemaster</text>

  <circle cx="300" cy="295" r="8" fill="#7b2fff" filter="url(#glow)"/>
  <text x="300" y="318" text-anchor="middle" fill="#9494a8" font-size="9" font-family="monospace">🔮 Oracle1</text>

  <circle cx="500" cy="295" r="8" fill="#00e87b" filter="url(#glow)"/>
  <text x="500" y="318" text-anchor="middle" fill="#9494a8" font-size="9" font-family="monospace">⚡ JC1</text>

  <!-- Legend -->
  <text x="300" y="345" text-anchor="middle" fill="#3a3a50" font-size="8" font-family="monospace">Rooms → Tiles → Agents · Each tile is a constraint atom</text>
</svg>
