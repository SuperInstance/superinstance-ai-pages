<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eisenstein Drift Erosion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a0f;color:#ccd;font-family:'SF Mono','Fira Code',monospace;overflow:hidden;height:100vh}
canvas{display:block}
#hud{position:absolute;top:10px;left:10px;pointer-events:auto;font-size:.6em}
#hud .row{margin-bottom:4px}
#hud .val{font-weight:700;color:#00ff88}
#hud .bad{color:#ff4444}
#hud .dim{color:#556}
#controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:.5em;color:#556;text-align:center;pointer-events:none}
#controls kbd{background:#151a20;padding:1px 5px;border-radius:3px;border:1px solid #333}
</style>
</head>
<body>
<div id="hud">
  <div class="row">Blocks: <span class="val" id="total">0</span> (<span class="val" id="exact">0</span> lattice / <span class="bad" id="approx">0</span> float)</div>
  <div class="row">Erosion: <span class="dim" id="erosion">0.0%</span></div>
  <div class="row">Time: <span class="dim" id="time">0s</span></div>
  <div class="row"><kbd>Click</kbd> place · <kbd>Shift</kbd> snap to lattice · <kbd>Scroll</kbd> zoom · <kbd>Drag</kbd> rotate</div>
</div>
<div id="controls">
  <kbd>Click</kbd> place block · <kbd>Shift+Click</kbd> snap to lattice · <kbd>Right-click</kbd> remove · <kbd>Scroll</kbd> zoom · <kbd>Drag</kbd> orbit
</div>
<canvas id="c"></canvas>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"}}
</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

// === Eisenstein lattice math ===
// E12 coordinates: (a, b) where position = (a - b/2, b*sqrt(3)/2)
// D6 neighbors: (a+1,b), (a-1,b), (a,b+1), (a,b-1), (a+1,b-1), (a-1,b+1)
const S3=Math.sqrt(3)/2;

function e12toWorld(a,b,z){return{x:a-b/2,y:z*1.1,z:b*S3}}
function worldToE12(x,y,z){
  // Approximate inverse — snap to nearest lattice point
  const b=Math.round(z/S3);
  const a=Math.round(x+b/2);
  return{a,b,z:Math.round(y/1.1)};
}
function e12key(a,b,z){return`${a},${b},${z}`}

// D6 neighbors in (a,b) plane
const D6=[[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];

// === Scene setup ===
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x060a0f);
scene.fog=new THREE.FogExp2(0x060a0f,0.015);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,200);
camera.position.set(15,12,15);
camera.lookAt(0,0,0);

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true;controls.dampingFactor=0.08;
controls.maxPolarAngle=Math.PI*0.45;
controls.minDistance=5;controls.maxDistance=60;

// Lighting
const amb=new THREE.AmbientLight(0x334455,0.6);scene.add(amb);
const dir=new THREE.DirectionalLight(0xffeedd,1.2);
dir.position.set(10,20,5);dir.castShadow=true;
dir.shadow.mapSize.set(1024,1024);
scene.add(dir);

// Ground plane (hex grid)
const gridGroup=new THREE.Group();scene.add(gridGroup);
const gridMat=new THREE.LineBasicMaterial({color:0x0a1a1a,transparent:true,opacity:0.4});
for(let a=-10;a<=10;a++){
  for(let b=-10;b<=10;b++){
    const p=e12toWorld(a,b,0);
    for(const[da,db]of D6){
      const na=a+da,nb=b+db;
      if(na>=-10&&na<=10&&nb>=-10&&nb<=10){
        const np=e12toWorld(na,nb,0);
        const geom=new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(p.x,p.y,p.z),
          new THREE.Vector3(np.x,np.y,np.z)
        ]);
        gridGroup.add(new THREE.Line(geom,gridMat));
      }
    }
  }
}

// === Block system ===
const blocks=new Map(); // key -> {a,b,z,mesh,drift,exact,placed}
const hexGeom=new THREE.CylinderGeometry(0.45,0.45,1.0,6); // hexagonal prism
const matExact=new THREE.MeshStandardMaterial({color:0x00ff88,roughness:0.3,metalness:0.5});
const matFloat=new THREE.MeshStandardMaterial({color:0xff6644,roughness:0.5,metalness:0.2});
const matGhost=new THREE.MeshStandardMaterial({color:0x00ff88,transparent:true,opacity:0.3});
const matGhostFloat=new THREE.MeshStandardMaterial({color:0xff6644,transparent:true,opacity:0.3});

let ghostMesh=null;
function updateGhost(a,b,z,exact){
  if(ghostMesh)scene.remove(ghostMesh);
  const mat=exact?matGhost:matGhostFloat;
  ghostMesh=new THREE.Mesh(hexGeom,mat);
  const p=e12toWorld(a,b,z);
  ghostMesh.position.set(p.x,p.y,p.z);
  scene.add(ghostMesh);
}
function hideGhost(){if(ghostMesh){scene.remove(ghostMesh);ghostMesh=null}}

function placeBlock(a,b,z,exact){
  const key=e12key(a,b,z);
  if(blocks.has(key))return;
  const mat=exact?matExact:matFloat;
  const mesh=new THREE.Mesh(hexGeom,mat);
  mesh.castShadow=true;mesh.receiveShadow=true;
  const p=e12toWorld(a,b,z);
  mesh.position.set(p.x,p.y,p.z);
  scene.add(mesh);
  
  // Drift vector for float blocks
  const drift=exact?{x:0,y:0,z:0}:{
    x:(Math.random()-0.5)*0.02,
    y:(Math.random()-0.5)*0.01,
    z:(Math.random()-0.5)*0.02,
    phase:Math.random()*Math.PI*2,
    freq:0.5+Math.random()*1.5
  };
  
  blocks.set(key,{a,b,z,mesh,drift,exact,placed:performance.now()/1000});
  updateStats();
}

function removeBlock(a,b,z){
  const key=e12key(a,b,z);
  const block=blocks.get(key);
  if(!block)return;
  scene.remove(block.mesh);
  blocks.delete(key);
  updateStats();
}

function updateStats(){
  let total=0,exact=0,approx=0;
  for(const[,b]of blocks){
    total++;if(b.exact)exact++;else approx++;
  }
  document.getElementById('total').textContent=total;
  document.getElementById('exact').textContent=exact;
  document.getElementById('approx').textContent=approx;
  const pct=total>0?(approx/total*100).toFixed(1):'0.0';
  document.getElementById('erosion').textContent=pct+'%';
}

// === Raycasting ===
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

canvas.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  
  raycaster.setFromCamera(mouse,camera);
  // Intersect with ground plane
  const plane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
  const pt=new THREE.Vector3();
  raycaster.ray.intersectPlane(plane,pt);
  if(pt){
    let height=0;
    // Find highest block at this (a,b)
    const e12=worldToE12(pt.x,pt.y,pt.z);
    // Check all z levels
    for(let z=20;z>=0;z--){
      if(blocks.has(e12key(e12.a,e12.b,z))){
        height=z+1;break;
      }
    }
    const snap=e.shift;
    const a=snap?e12.a:Math.round(pt.x*10)/10; // TODO: proper float coord
    const b=snap?e12.b:Math.round(pt.z/S3*10)/10;
    if(snap){
      updateGhost(e12.a,e12.b,height,true);
    }else{
      // For float placement, use raw world coords
      updateGhost(Math.round(pt.x+0.5),Math.round(pt.z/S3+0.5),height,false);
    }
  }
});

canvas.addEventListener('click',e=>{
  if(ghostMesh){
    // Determine position from ghost
    const gp=ghostMesh.position;
    const e12=worldToE12(gp.x,gp.y,gp.z);
    const snap=e.shift;
    placeBlock(e12.a,e12.b,e12.z,snap);
  }
});

canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  raycaster.setFromCamera(mouse,camera);
  const meshes=[...blocks.values()].map(b=>b.mesh);
  const hits=raycaster.intersectObjects(meshes);
  if(hits.length>0){
    const hit=hits[0].object;
    for(const[key,block]of blocks){
      if(block.mesh===hit){
        scene.remove(block.mesh);
        blocks.delete(key);
        updateStats();
        break;
      }
    }
  }
});

// === Animation loop ===
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  controls.update();
  
  // Drift animation for float blocks
  for(const[,block]of blocks){
    if(!block.exact){
      const age=t-block.placed;
      const amplitude=Math.min(age*0.003,0.5); // grows over time
      const d=block.drift;
      const basePos=e12toWorld(block.a,block.z,block.b);
      block.mesh.position.x=basePos.x+Math.sin(t*d.freq+d.phase)*amplitude*d.x*50;
      block.mesh.position.y=basePos.y+Math.cos(t*d.freq*0.7+d.phase)*amplitude*d.y*50;
      block.mesh.position.z=basePos.z+Math.sin(t*d.freq*1.3+d.phase)*amplitude*d.z*50;
      
      // Color shift as drift grows
      const driftPct=Math.min(amplitude/0.5,1);
      const r=1.0;
      const g=0.4*(1-driftPct);
      const b2=0.27*(1-driftPct);
      block.mesh.material.color.setRGB(r,g,b2);
      
      // Wobble rotation
      block.mesh.rotation.y=Math.sin(t*2+d.phase)*amplitude*0.3;
    }
  }
  
  document.getElementById('time').textContent=t.toFixed(0)+'s';
  
  renderer.render(scene,camera);
}

animate();

// Resize
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
